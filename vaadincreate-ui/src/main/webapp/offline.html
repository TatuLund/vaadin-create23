<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vaadin Create 23 - Offline</title>

  <!-- Reuse app theme when cached -->
  <link rel="stylesheet" href="./VAADIN/themes/vaadincreate/styles.css" />
  <link rel="stylesheet" href="./VAADIN/styles/additional-styles.css" />

  <style>
    :root {
      --menu-bg: rgb(59, 63, 66);
      --menu-text: rgba(255, 255, 255, 0.8);
      --menu-text-strong: #fff;
      --menu-header-height: 38px;
      --content-bg: #fafafa;
      --card-bg: #fff;
      --card-border: #dedede;
      --accent: rgb(33, 101, 161);
      --warning-bg: #fff4d6;
      --warning-border: #f0d58a;
      --warning-text: #6f4e00;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Open Sans", "Segoe UI", Arial, sans-serif;
      background: var(--content-bg);
      color: #1f2328;
      overflow: hidden;
    }

    .offline-ui {
      display: flex;
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    /* Override Vaadin UI class sizing so the offline shell always fills screen */
    .offline-ui.v-ui {
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      box-sizing: border-box;
    }

    .offline-menu {
      width: 156px;
      flex: 0 0 156px;
      background: var(--menu-bg);
      color: var(--menu-text);
      filter: blur(1px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .offline-title {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 80px;
      align-content: center;
      padding-left: 60px !important
    }

    .offline-title img {
      width: 38px;
      height: 38px;
      max-width: 100%;
      display: block;
    }

    .offline-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--menu-text);
      width: 44px;
      height: 36px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 3px;
    }

    .offline-toggle:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .offline-topbar {
      filter: blur(1px);
      display: none;
      height: var(--menu-header-height);
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: var(--accent);
      color: var(--menu-text-strong);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .offline-topbar-title {
      margin-left: auto;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .offline-nav {
      padding: 8px;
      flex: 1;
    }

    .offline-nav a {
      display: block;
      text-decoration: none;
      color: var(--menu-text);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 4px;
      pointer-events: none;
      cursor: default;
      user-select: none;
    }

    .offline-nav a.selected {
      background: rgba(255,255,255,0.12);
      color: var(--menu-text-strong);
    }

    .offline-user {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 10px 14px;
      color: var(--menu-text);
      font-size: 13px;
    }

    .offline-content {
      flex: 1;
      min-width: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      overflow: auto;
      padding: 24px;
      background: var(--content-bg);
    }

    .offline-about {
      width: min(500px, 100%);
      max-width: 500px;
      margin: 0;
    }

    .offline-banner {
      border: 1px solid #dce6f2;
      background: #f4f8fd;
      color: var(--warning-text);
      border-radius: 4px;
      padding: 7px 10px;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 13px;
    }

    .offline-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      box-shadow: 0 2px 3px rgba(0,0,0,0.05);
      padding: 20px;
      max-width: 760px;
    }

    .offline-card h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 600;
    }

    .offline-card p {
      margin: 0 0 10px;
      line-height: 1.45;
      color: #4f5863;
    }

    .status-chip {
      display: inline-block;
      margin-top: 10px;
      border: 1px solid #cfd4da;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #3c434a;
      background: #fff;
    }

    .hint {
      margin-top: 10px;
      color: #6a737d;
      font-size: 13px;
    }

    .menu-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 10;
    }

    @media (max-width: 800px) {
      .offline-ui {
        flex-direction: column;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .offline-menu {
        position: fixed;
        top: var(--menu-header-height);
        left: 0;
        width: 156px;
        max-width: 85vw;
        transform: translateX(-100%);
        transition: transform 140ms ease;
        z-index: 20;
        box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      }

      body.menu-open .offline-menu {
        transform: translateX(0);
      }

      body.menu-open .menu-backdrop {
        display: block;
      }

      .offline-topbar {
        display: flex;
      }

      .offline-title {
        display: none;
      }

      .offline-nav {
        display: block;
      }

      .offline-nav a {
        margin-bottom: 4px;
      }

      .offline-content {
        min-height: 0;
        padding: 12px;
      }

      .offline-about {
        margin-top: 0;
      }

      .offline-card {
        padding: 14px;
      }

      .offline-card h1 {
        font-size: 20px;
      }

      .offline-user {
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-backdrop" id="menu-backdrop" aria-hidden="true"></div>
  <div class="offline-ui vaadincreate v-ui with-menu">
    <header class="offline-topbar" aria-label="Offline top bar">
      <button class="offline-toggle" id="menu-toggle" type="button"
        aria-label="Toggle menu">Menu</button>
      <div class="offline-topbar-title">Logout</div>
    </header>

    <aside class="offline-menu valo-menu valo-menu-root valo-menu-part">
      <div class="offline-title valo-menu-title">
        <img src="./VAADIN/themes/vaadincreate/images/bookstore.png" alt="Bookstore Logo" />
      </div>
      <nav class="offline-nav valo-menuitems valo-menu-items" aria-label="Application">
        <a class="selected" href="#">About</a>
        <a href="#">Books</a>
        <a href="#">Purchases</a>
        <a href="#">Stats</a>
        <a href="#">Admin</a>
      </nav>
      <div class="offline-user">Logout</div>
    </aside>

    <main class="offline-content valo-content">
      <div class="offline-about">
        <div class="offline-banner">Offline</div>
        <section class="offline-card">
          <h1>Vaadin Create '23</h1>
          <p>The application is offline. Interactive views are unavailable.</p>
          <div role="button" tabindex="0" class="status-chip" id="status-chip">Offline mode active</div>
          <div class="hint">You will be redirected to the app when connection returns.</div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var chip = document.getElementById("status-chip");
      var menuToggle = document.getElementById("menu-toggle");
      var menuBackdrop = document.getElementById("menu-backdrop");
      var returnUrlKey = "pwa-return-url";

      function closeMenu() {
        document.body.classList.remove("menu-open");
      }

      function toggleMenu() {
        document.body.classList.toggle("menu-open");
      }

      function navigateBackToApp() {
        var returnUrl = "";
        try {
          returnUrl = sessionStorage.getItem(returnUrlKey) || "";
        } catch (ignore) {
          returnUrl = "";
        }
        if (returnUrl.indexOf("/offline.html") !== -1) {
          returnUrl = "";
        }
        console.log("Navigating back to app, returnUrl:", returnUrl);
        window.location.href = returnUrl || "/";
      }

      function updateOnline() {
        chip.textContent = "Back online, returning to app...";
        chip.addEventListener("click", navigateBackToApp);
        setTimeout(navigateBackToApp, 250);
      }

      function updateOffline() {
          chip.textContent = "Offline mode active";
      }

      window.addEventListener("offline", updateOffline);
      window.addEventListener("online", updateOnline);

      if (menuToggle) {
        menuToggle.addEventListener("click", toggleMenu);
      }
      if (menuBackdrop) {
        menuBackdrop.addEventListener("click", closeMenu);
      }

      function startPolling() {
        fetch(window.location.href, { method: "HEAD", cache: "no-store" })
          .then(function (response) {
            if (response.ok) {
              updateOnline();
            } else {
              setTimeout(startPolling, 1000);
            }
          })
          .catch(function () {
            setTimeout(startPolling, 1000);
          });
      }

      setTimeout(startPolling, 1000);
    })();
  </script>
</body>
</html>
