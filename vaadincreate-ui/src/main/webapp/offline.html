<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vaadin Create 23 - Offline</title>

  <!-- Reuse app theme when cached -->
  <link rel="stylesheet" href="./VAADIN/themes/vaadincreate/styles.css" />
  <link rel="stylesheet" href="./VAADIN/styles/additional-styles.css" />
</head>
<body class="vaadincreate offline-page">
  <div class="menu-backdrop" id="menu-backdrop" aria-hidden="true"></div>
  <div class="offline-ui v-ui with-menu">
    <header class="offline-topbar" id="offline-topbar" aria-label="Offline top bar">
      <button class="offline-toggle" id="menu-toggle" type="button"
        aria-label="Toggle menu">Menu</button>
      <div class="offline-topbar-title" id="topbar-logout">Logout</div>
    </header>

    <aside class="offline-menu valo-menu valo-menu-root valo-menu-part">
      <div class="offline-title valo-menu-title">
        <img src="./VAADIN/themes/vaadincreate/images/bookstore.png" alt="Bookstore Logo" />
      </div>
      <nav class="offline-nav valo-menuitems valo-menu-items" id="offline-nav" aria-label="Application">
        <a class="selected" href="#" id="nav-about">About</a>
        <a href="#" id="nav-books">Books</a>
        <a href="#" id="nav-purchases">Purchases</a>
        <a href="#" id="nav-stats">Stats</a>
        <a href="#" id="nav-admin">Admin</a>
      </nav>
      <div class="offline-user" id="offline-user">Logout</div>
    </aside>

    <main class="offline-content valo-content">
      <div class="offline-about">
        <div class="offline-banner" id="offline-banner">Offline</div>
        <section class="offline-card">
          <h1>Vaadin Create '23</h1>
          <p id="offline-message">The application is offline. Interactive views are unavailable.</p>
          <div role="button" tabindex="0" class="status-chip" id="status-chip">Offline mode active</div>
          <div class="hint" id="offline-hint">You will be redirected to the app when connection returns.</div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var chip = document.getElementById("status-chip");
      var menuToggle = document.getElementById("menu-toggle");
      var menuBackdrop = document.getElementById("menu-backdrop");
      var topbar = document.getElementById("offline-topbar");
      var topbarLogout = document.getElementById("topbar-logout");
      var nav = document.getElementById("offline-nav");
      var navAbout = document.getElementById("nav-about");
      var navBooks = document.getElementById("nav-books");
      var navPurchases = document.getElementById("nav-purchases");
      var navStats = document.getElementById("nav-stats");
      var navAdmin = document.getElementById("nav-admin");
      var offlineUser = document.getElementById("offline-user");
      var offlineBanner = document.getElementById("offline-banner");
      var offlineMessage = document.getElementById("offline-message");
      var offlineHint = document.getElementById("offline-hint");
      var offlineChip = document.getElementById("status-chip");
      var returnUrlKey = "pwa-return-url";
      var redirectScheduled = false;
      var translations = {
        en: {
          pageTitle: "Vaadin Create 23 - Offline",
          topbarLabel: "Offline top bar",
          toggleMenu: "Menu",
          toggleMenuAria: "Toggle menu",
          logout: "Logout",
          appNav: "Application",
          about: "About",
          books: "Books",
          purchases: "Purchases",
          stats: "Stats",
          admin: "Admin",
          offlineBanner: "Offline",
          offlineMessage: "The application is offline. Interactive views are unavailable.",
          statusOffline: "Offline mode active",
          statusOnline: "Back online, returning to app...",
          offlineHint: "You will be redirected to the app when connection returns."
        },
        fi: {
          pageTitle: "Vaadin Create 23 - Ei yhteytta",
          topbarLabel: "Offline-ylapalkki",
          toggleMenu: "Valikko",
          toggleMenuAria: "Avaa valikko",
          logout: "Kirjaudu ulos",
          appNav: "Sovellus",
          about: "Tietoa",
          books: "Kirjat",
          purchases: "Ostot",
          stats: "Tilastot",
          admin: "Yllapito",
          offlineBanner: "Ei yhteytta",
          offlineMessage: "Sovellus on offline-tilassa. Interaktiiviset nakymat eivat ole kaytettavissa.",
          statusOffline: "Offline-tila aktiivinen",
          statusOnline: "Yhteys palautui, palataan sovellukseen...",
          offlineHint: "Sinut ohjataan sovellukseen, kun yhteys palautuu."
        },
        sv: {
          pageTitle: "Vaadin Create 23 - Offline",
          topbarLabel: "Offline-rad",
          toggleMenu: "Meny",
          toggleMenuAria: "Vaxla meny",
          logout: "Logga ut",
          appNav: "Applikation",
          about: "Om",
          books: "Bocker",
          purchases: "Kop",
          stats: "Statistik",
          admin: "Admin",
          offlineBanner: "Offline",
          offlineMessage: "Applikationen ar offline. Interaktiva vyer ar inte tillgangliga.",
          statusOffline: "Offline-lage aktivt",
          statusOnline: "Uppkopplad igen, atergar till applikationen...",
          offlineHint: "Du omdirigeras till appen nar anslutningen ar tillbaka."
        },
        ge: {
          pageTitle: "Vaadin Create 23 - Offline",
          topbarLabel: "Offline-Leiste",
          toggleMenu: "Menue",
          toggleMenuAria: "Menue umschalten",
          logout: "Abmelden",
          appNav: "Anwendung",
          about: "Info",
          books: "Bucher",
          purchases: "Kauefe",
          stats: "Statistik",
          admin: "Admin",
          offlineBanner: "Offline",
          offlineMessage: "Die Anwendung ist offline. Interaktive Ansichten sind nicht verfuegbar.",
          statusOffline: "Offline-Modus aktiv",
          statusOnline: "Wieder online, zurueck zur Anwendung...",
          offlineHint: "Du wirst zur App weitergeleitet, sobald die Verbindung zurueck ist."
        }
      };
      var texts = resolveTexts();

      function resolveTexts() {
        var lang = getCookieValue("language");
        if (lang) {
          lang = lang.toLowerCase();
        }
        if (lang === "de") {
          lang = "ge";
        }
        if (!translations[lang]) {
          lang = "en";
        }
        document.documentElement.lang = lang === "ge" ? "de" : lang;
        return translations[lang];
      }

      function getCookieValue(name) {
        var cookieParts = document.cookie ? document.cookie.split(";") : [];
        for (var i = 0; i < cookieParts.length; i++) {
          var part = cookieParts[i].trim();
          if (part.indexOf(name + "=") === 0) {
            var value = part.substring(name.length + 1);
            try {
              return decodeURIComponent(value);
            } catch (ignore) {
              return value;
            }
          }
        }
        return "";
      }

      function applyLocalization() {
        document.title = texts.pageTitle;
        if (topbar) {
          topbar.setAttribute("aria-label", texts.topbarLabel);
        }
        if (menuToggle) {
          menuToggle.textContent = texts.toggleMenu;
          menuToggle.setAttribute("aria-label", texts.toggleMenuAria);
        }
        if (topbarLogout) {
          topbarLogout.textContent = texts.logout;
        }
        if (offlineUser) {
          offlineUser.textContent = texts.logout;
        }
        if (nav) {
          nav.setAttribute("aria-label", texts.appNav);
        }
        if (navAbout) {
          navAbout.textContent = texts.about;
        }
        if (navBooks) {
          navBooks.textContent = texts.books;
        }
        if (navPurchases) {
          navPurchases.textContent = texts.purchases;
        }
        if (navStats) {
          navStats.textContent = texts.stats;
        }
        if (navAdmin) {
          navAdmin.textContent = texts.admin;
        }
        if (offlineBanner) {
          offlineBanner.textContent = texts.offlineBanner;
        }
        if (offlineMessage) {
          offlineMessage.textContent = texts.offlineMessage;
        }
        if (offlineHint) {
          offlineHint.textContent = texts.offlineHint;
        }
        if (offlineChip) {
          offlineChip.textContent = texts.statusOffline;
        }
      }

      function closeMenu() {
        document.body.classList.remove("menu-open");
      }

      function toggleMenu() {
        document.body.classList.toggle("menu-open");
      }

      function navigateBackToApp() {
        var returnUrl = "";
        try {
          returnUrl = sessionStorage.getItem(returnUrlKey) || "";
        } catch (ignore) {
          returnUrl = "";
        }
        if (returnUrl.indexOf("/offline.html") !== -1) {
          returnUrl = "";
        }
        console.log("Navigating back to app, returnUrl:", returnUrl);
        window.location.href = returnUrl || "/";
      }

      function updateOnline() {
        if (redirectScheduled) {
          return;
        }
        redirectScheduled = true;
        chip.textContent = texts.statusOnline;
        chip.onclick = navigateBackToApp;
        setTimeout(navigateBackToApp, 250);
      }

      function updateOffline() {
        redirectScheduled = false;
        chip.textContent = texts.statusOffline;
      }

      window.addEventListener("offline", updateOffline);
      window.addEventListener("online", updateOnline);

      if (menuToggle) {
        menuToggle.addEventListener("click", toggleMenu);
      }
      if (menuBackdrop) {
        menuBackdrop.addEventListener("click", closeMenu);
      }

      function startPolling() {
        fetch(window.location.href, { method: "HEAD", cache: "no-store" })
          .then(function (response) {
            if (response.ok) {
              updateOnline();
            } else {
              setTimeout(startPolling, 1000);
            }
          })
          .catch(function () {
            setTimeout(startPolling, 1000);
          });
      }

      applyLocalization();
      setTimeout(startPolling, 1000);
    })();
  </script>
</body>
</html>
